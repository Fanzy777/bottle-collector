<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Скупщик бутылок</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container {
            background: #2a2a2a;
            border-radius: 10px;
            padding: 30px;
            max-width: 400px;
            margin: 0 auto;
        }
        input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin: 20px 0;
            border-radius: 5px;
            border: none;
        }
        button {
            background: gold;
            color: black;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        .price {
            color: gold;
            font-size: 20px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>♻️ Скупщик бутылок</h1>
        <p>Курс: 1 бутылка = 2$</p>
        <div class="price" id="available">У тебя: 0 бутылок</div>
        <input type="number" id="amount" placeholder="Сколько бутылок продать?" min="1">
        <button onclick="sell()">ПРОДАТЬ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Получаем начальные данные от бота (количество бутылок)
        let userBottles = 0;
        try {
            const initData = tg.initDataUnsafe?.start_param;
            if (initData) {
                userBottles = parseInt(initData) || 0;
                document.getElementById('available').innerText = `У тебя: ${userBottles} бутылок`;
            }
        } catch(e) {}

        function sell() {
            const amount = parseInt(document.getElementById('amount').value);
            if (isNaN(amount) || amount <= 0) {
                alert('Введи корректное количество');
                return;
            }
            if (amount > userBottles) {
                alert('У тебя столько нет!');
                return;
            }
            // Отправляем данные боту
            tg.sendData(JSON.stringify({
                action: 'sell',
                amount: amount
            }));
            tg.close();
        }
    </script>
</body>
</html>
